   <header class="header-bg">

  <main class="container-main">
    <section class="section-form">
      <h2>Formulário</h2>
      <form action="" class="form">
        <div class="form-header">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <label for="cep">CEP</label>
        <input type="number" id="cep" name="cep" placeholder="Digite seu CEP." required>
        </div>

        <div class="form-endereco">
          <label for="logradouro">Logradouro</label>
          <input type="text" id="logradouro" name="logradouro" placeholder="Rua Logo Ali">
         </div>
         <div class="form-endereco">
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" name="bairro" placeholder="Aqui Mesmo">
           </div>
           <div class="form-endereco">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" name="cidade" placeholder="Dois de Nós">
           </div>
          <div class="form-endereco">
          <label for="estado">Estado</label>
          <input type="text" id="estado" name="estado" placeholder="Rio Grande do Sul">
        </div>
      </form>
      <img src="img/endereco_fiscal.png" alt="endereço">
